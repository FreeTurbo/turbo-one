<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>纸间映像 · 橙调画廊</title>
  <!-- 粗宋 & 宋体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ---------- 全局 · 微泛黄纸张底色 · 低饱和橙 ---------- */
    :root {
      --paper-bg: #fcf8f0;        /* 微微泛黄的纸张色 */
      --paper-deep: #f3ede2;
      --orange-light: #f5e1d3;
      --orange-soft: #e6c9b8;
      --orange-main: #cc9b82;      /* 主橙，低饱和 */
      --orange-deep: #a57056;
      --orange-warm: #ddb6a2;
      --glass-bg: rgba(252, 245, 235, 0.45);
      --glass-border: rgba(200, 160, 135, 0.25);
      --text-dark: #3f322a;
      --text-soft: #6b574a;
      --shadow-sm: 0 10px 24px -6px rgba(140, 100, 70, 0.08);
      --card-radius: 28px;
      --blur-amount: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', '宋体', serif;
      background-color: var(--paper-bg);   /* 纯色微黄纸底 */
      min-height: 100vh;
      color: var(--text-dark);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* 整体微纹理 (极淡，保留纸张感) */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 30% 20%, rgba(240, 220, 200, 0.2) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .app {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px 24px;
    }

    /* ---------- 导航栏 · 毛玻璃效果 (无“毛玻璃”文字) ---------- */
    .glass-nav {
      position: sticky;
      top: 12px;
      z-index: 30;
      backdrop-filter: blur(var(--blur-amount));
      -webkit-backdrop-filter: blur(var(--blur-amount));
      background: rgba(250, 242, 232, 0.55);
      border: 1px solid var(--glass-border);
      border-radius: 60px;
      padding: 10px 18px;
      margin: 12px 0 20px;
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-weight: 900;
      font-size: 1.6rem;
      letter-spacing: 1px;
      color: var(--orange-deep);
      font-family: 'Noto Serif SC', serif;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .logo i {
      color: var(--orange-main);
      font-size: 1.3rem;
    }

    .nav-links {
      display: flex;
      gap: 12px;
    }
    .nav-links a {
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-soft);
      padding: 6px 12px;
      border-radius: 40px;
      background: transparent;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 0.5px solid transparent;
    }
    .nav-links a:hover {
      background: rgba(210, 150, 120, 0.15);
      border-color: var(--glass-border);
      color: var(--orange-deep);
    }

    /* 区块通用 */
    section {
      scroll-margin-top: 90px;
      margin-bottom: 36px;
    }

    .section-title {
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: -0.01em;
      margin-bottom: 16px;
      color: var(--text-dark);
      border-left: 6px solid var(--orange-main);
      padding-left: 18px;
    }

    /* ---------- 创作目的区块 · 毛玻璃卡片 ---------- */
    .purpose-card {
      backdrop-filter: blur(var(--blur-amount));
      -webkit-backdrop-filter: blur(var(--blur-amount));
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      padding: 28px 24px;
      box-shadow: var(--shadow-sm);
    }
    .purpose-card p {
      font-size: 1.1rem;
      margin-bottom: 16px;
      color: var(--text-soft);
      font-weight: 400;
    }
    .purpose-card .signature {
      text-align: right;
      font-style: italic;
      color: var(--orange-deep);
      font-weight: 500;
    }

    /* ---------- 影音展示 (画廊) ---------- */
    .gallery-grid {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .photo-card {
      backdrop-filter: blur(var(--blur-amount));
      -webkit-backdrop-filter: blur(var(--blur-amount));
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.3s;
    }

    .card-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border-bottom: 1px solid rgba(200, 150, 120, 0.2);
      background-color: #e5d6ca;
    }
    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .card-caption {
      padding: 16px 18px 4px;
    }
    .card-caption h3 {
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--text-dark);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .photo-meta {
      font-size: 0.9rem;
      color: var(--text-soft);
      margin-top: 4px;
    }

    /* 留言区域 */
    .comments-section {
      padding: 8px 18px 18px;
    }

    .comment-list {
      list-style: none;
      margin-bottom: 18px;
      max-height: 200px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .comment-item {
      display: flex;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 0.5px dashed rgba(170, 130, 100, 0.25);
    }
    .comment-item:last-child {
      border-bottom: none;
    }

    .comment-avatar {
      width: 32px;
      height: 32px;
      background: rgba(200, 140, 100, 0.2);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--orange-deep);
      font-weight: 700;
      flex-shrink: 0;
      border: 0.5px solid var(--glass-border);
    }

    .comment-body {
      flex: 1;
    }
    .comment-author {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-dark);
      margin-bottom: 2px;
    }
    .comment-text {
      font-size: 0.95rem;
      color: var(--text-soft);
      word-break: break-word;
    }

    .empty-comment {
      color: var(--text-soft);
      opacity: 0.7;
      font-style: italic;
      padding: 8px 0;
      font-size: 0.9rem;
    }

    .add-comment {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    .comment-input {
      flex: 1;
      background: rgba(255, 250, 240, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: 48px;
      padding: 12px 18px;
      font-family: 'Noto Serif SC', serif;
      font-size: 0.95rem;
      color: var(--text-dark);
      outline: none;
    }
    .comment-input:focus {
      border-color: var(--orange-main);
      background: rgba(255, 248, 238, 0.7);
    }
    .comment-input::placeholder {
      color: #a18676;
      font-weight: 300;
    }

    .comment-btn {
      background: rgba(200, 140, 100, 0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 48px;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--orange-deep);
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.2s;
      flex-shrink: 0;
    }
    .comment-btn:hover {
      background: var(--orange-main);
      color: white;
    }

    /* 待开发区块 */
    .dev-card {
      backdrop-filter: blur(var(--blur-amount));
      -webkit-backdrop-filter: blur(var(--blur-amount));
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 42px;
      padding: 36px 24px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .dev-card i {
      font-size: 2.8rem;
      color: var(--orange-main);
      opacity: 0.6;
      margin-bottom: 16px;
    }
    .dev-card h3 {
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--text-dark);
      margin-bottom: 8px;
    }
    .dev-card p {
      color: var(--text-soft);
    }

    .footer-note {
      margin-top: 40px;
      text-align: center;
      padding: 16px;
      color: var(--text-soft);
      font-size: 0.85rem;
    }

    /* 响应式 */
    @media (min-width: 640px) {
      .app { max-width: 720px; }
      .gallery-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }
    }
    @media (max-width: 400px) {
      .nav-links a { font-size: 0.8rem; padding: 4px 8px; }
      .logo { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
<div class="app">
  
  <!-- 导航栏 · 三个栏目 (毛玻璃视觉，无文字提及) -->
  <header class="glass-nav">
    <div class="logo">
      <i class="fas fa-feather-alt"></i> 纸·映
    </div>
    <div class="nav-links">
      <a href="#purpose">创作目的</a>
      <a href="#gallery">影音展示</a>
      <a href="#upcoming">待开发</a>
    </div>
  </header>

  <!-- 创作目的区块 -->
  <section id="purpose">
    <h2 class="section-title">创作目的</h2>
    <div class="purpose-card">
      <p>我们相信影像与文字的交织，能留存温度与记忆。这个空间诞生于对「低饱和橙」的偏爱——它不刺眼，却足够温暖，像旧时纸张上的夕照。</p>
      <p>每一张照片都是一个入口，你的留言会成为它的一部分。没有预设的喧嚣，只有观者留下的真实回响。愿这里成为你安静看展、随心对话的角落。</p>
      <div class="signature">—— 纸映团队</div>
    </div>
  </section>

  <!-- 影音展示 · 画廊 (初始无留言) -->
  <section id="gallery">
    <h2 class="section-title">影音展示</h2>
    <div id="galleryContainer" class="gallery-grid">
      <!-- 由 JavaScript 动态渲染，初始评论均为空 -->
    </div>
  </section>

  <!-- 待开发区块 -->
  <section id="upcoming">
    <h2 class="section-title">待开发</h2>
    <div class="dev-card">
      <i class="fas fa-hourglass-half"></i>
      <h3>即将呈现</h3>
      <p>更多功能正在筹备中，敬请期待。</p>
    </div>
  </section>

  <div class="footer-note">
    <i class="far fa-comment"></i> 轻触留言 · 心意即现
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- 画廊数据 (无初始留言) ----------
    const galleryData = [
      {
        id: 1,
        title: '晨雾·山间',
        location: '橙调 · 静谧',
        imageUrl: 'https://images.pexels.com/photos/247600/pexels-photo-247600.jpeg?auto=compress&cs=tinysrgb&w=600',
        fallbackImg: 'https://picsum.photos/id/1043/400/300',
      },
      {
        id: 2,
        title: '秋·暖阳',
        location: '陶土色的温柔',
        imageUrl: 'https://images.pexels.com/photos/33109/fall-autumn-red-season.jpg?auto=compress&cs=tinysrgb&w=600',
        fallbackImg: 'https://picsum.photos/id/28/400/300',
      },
      {
        id: 3,
        title: '橙光·海岸',
        location: '低饱和晚霞',
        imageUrl: 'https://images.pexels.com/photos/189349/pexels-photo-189349.jpeg?auto=compress&cs=tinysrgb&w=600',
        fallbackImg: 'https://picsum.photos/id/37/400/300',
      },
      {
        id: 4,
        title: '窗·花影',
        location: '杏色柔焦',
        imageUrl: 'https://images.pexels.com/photos/931177/pexels-photo-931177.jpeg?auto=compress&cs=tinysrgb&w=600',
        fallbackImg: 'https://picsum.photos/id/30/400/300',
      },
      {
        id: 5,
        title: '巷·余晖',
        location: '暖调旧城',
        imageUrl: 'https://images.pexels.com/photos/2104742/pexels-photo-2104742.jpeg?auto=compress&cs=tinysrgb&w=600',
        fallbackImg: 'https://picsum.photos/id/62/400/300',
      },
      {
        id: 6,
        title: '橘猫·午后',
        location: '慵懒一刻',
        imageUrl: 'https://images.pexels.com/photos/1170986/pexels-photo-1170986.jpeg?auto=compress&cs=tinysrgb&w=600',
        fallbackImg: 'https://picsum.photos/id/40/400/300',
      }
    ];

    const container = document.getElementById('galleryContainer');
    
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function getAvatarChar(name) {
      return name ? name.charAt(0).toUpperCase() : '?';
    }

    // 渲染画廊 (所有卡片初始留言为空)
    function renderGallery() {
      if (!container) return;
      let html = '';
      galleryData.forEach(item => {
        html += `
          <div class="photo-card" data-card-id="${item.id}">
            <div class="card-image">
              <img src="${item.imageUrl}" alt="${escapeHtml(item.title)}" loading="lazy"
                   onerror="this.onerror=null; this.src='${item.fallbackImg}';">
            </div>
            <div class="card-caption">
              <h3>
                <i class="fas fa-circle" style="font-size: 0.6rem; color: #cc9b82;"></i> 
                ${escapeHtml(item.title)}
              </h3>
              <div class="photo-meta">
                <i class="fas fa-map-pin" style="margin-right: 4px;"></i>${escapeHtml(item.location)}
              </div>
            </div>
            
            <div class="comments-section">
              <ul class="comment-list" data-comment-list="${item.id}">
                <li class="empty-comment"><i class="far fa-smile"></i> 暂无留言，写下第一条吧</li>
              </ul>
              
              <div class="add-comment">
                <input type="text" class="comment-input" placeholder="你的话语…" maxlength="80" data-input-id="${item.id}">
                <button class="comment-btn" data-send-id="${item.id}" aria-label="发送">
                  <i class="fas fa-paper-plane"></i>
                </button>
              </div>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    // 留言交互 (事件委托)
    function handleCommentSend(e) {
      const btn = e.target.closest('.comment-btn');
      if (!btn) return;
      
      const sendId = btn.getAttribute('data-send-id');
      const card = btn.closest('.photo-card');
      if (!card) return;
      
      const input = card.querySelector(`.comment-input[data-input-id="${sendId}"]`);
      if (!input) return;
      
      const text = input.value.trim();
      if (!text) {
        input.placeholder = '写点什么吧 ✍️';
        input.style.borderColor = '#cc9b82';
        setTimeout(() => input.style.borderColor = '', 400);
        return;
      }
      
      const list = card.querySelector(`.comment-list[data-comment-list="${sendId}"]`);
      if (!list) return;
      
      // 移除空状态提示
      const emptyMsg = list.querySelector('.empty-comment');
      if (emptyMsg) emptyMsg.remove();
      
      // 随机访客名
      const names = ['橙子', '杏子', '蜜柑', '陶陶', '柚子', '暖暖'];
      const author = names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random()*20);
      
      const newItem = document.createElement('li');
      newItem.className = 'comment-item';
      newItem.innerHTML = `
        <div class="comment-avatar">${getAvatarChar(author)}</div>
        <div class="comment-body">
          <div class="comment-author">${escapeHtml(author)}</div>
          <div class="comment-text">${escapeHtml(text)}</div>
        </div>
      `;
      
      list.prepend(newItem);
      input.value = '';
      
      // 视觉反馈
      btn.style.backgroundColor = '#cc9b82';
      btn.style.color = 'white';
      setTimeout(() => {
        btn.style.backgroundColor = '';
        btn.style.color = '';
      }, 150);
      
      newItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // 回车发送
    function handleKeyPress(e) {
      if (e.target.classList.contains('comment-input') && e.key === 'Enter') {
        e.preventDefault();
        const input = e.target;
        const id = input.getAttribute('data-input-id');
        const btn = input.closest('.photo-card')?.querySelector(`.comment-btn[data-send-id="${id}"]`);
        if (btn) btn.click();
      }
    }

    // 平滑滚动 (导航链接)
    function initSmoothScroll() {
      document.querySelectorAll('.nav-links a').forEach(anchor => {
        anchor.addEventListener('click', function(e) {
          e.preventDefault();
          const targetId = this.getAttribute('href');
          if (targetId && targetId !== '#') {
            const targetEl = document.querySelector(targetId);
            if (targetEl) {
              targetEl.scrollIntoView({ behavior: 'smooth' });
            }
          }
        });
      });
    }

    renderGallery();
    
    if (container) {
      container.addEventListener('click', handleCommentSend);
      container.addEventListener('keypress', handleKeyPress);
    }
    
    initSmoothScroll();
  })();
</script>
</body>
</html>
